<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockvisor — See the blockchain clearly</title>
  <meta name="description" content="Blockvisor — Something is watching the blockchain. Launching soon." />

  <!-- Inter from Google Fonts (matches the Claude preview rendering) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0F0E14;
      color: #F5F3FF;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .cs-page {
      min-height: 100vh;
      padding: 56px 28px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
    }
    .cs-page::before {
      content: '';
      position: absolute;
      top: 0; left: 28px; right: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,164,255,0.4), transparent);
    }

    .cs-top {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cs-mark {
      font-size: 11px;
      letter-spacing: 4px;
      color: #B8A4FF;
      font-weight: 500;
    }
    .cs-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      color: #5DCAA5;
      font-weight: 500;
    }
    .cs-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5DCAA5;
      box-shadow: 0 0 8px #5DCAA5;
      animation: cs-pulse 2s ease-in-out infinite;
    }
    @keyframes cs-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .cs-center {
      text-align: center;
      padding: 32px 0;
      width: 100%;
    }
    .cs-logo-wrap {
      margin: 0 auto 36px;
      display: inline-block;
    }
    .cs-logo-wrap svg {
      width: 320px;
      height: auto;
      max-width: 80vw;
    }
    .cs-wordmark {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -1px;
      margin-bottom: 28px;
      line-height: 1;
    }
    .cs-wordmark .block { color: #FFFFFF; }
    .cs-wordmark .visor { color: #5DCAA5; }

    .cs-eyebrow {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 4px;
      color: #B8A4FF;
      padding: 5px 14px;
      border: 0.5px solid rgba(184,164,255,0.35);
      border-radius: 999px;
      background: rgba(184,164,255,0.08);
      font-weight: 500;
    }

    .cs-bottom {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 24px;
      border-top: 0.5px solid rgba(184,164,255,0.1);
      font-size: 11px;
    }
    .cs-copy {
      color: #ECEAFB;
      opacity: 0.55;
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .cs-page { padding: 32px 20px 28px; }
      .cs-top { flex-direction: column; gap: 12px; align-items: center; }
      .cs-wordmark { font-size: 26px; }
      .cs-mark, .cs-status, .cs-eyebrow { font-size: 10px; letter-spacing: 3px; }
      .cs-copy { font-size: 10px; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="cs-page">

    <div class="cs-top">
      <span class="cs-mark">BLOCKVISOR · 2026</span>
      <div class="cs-status">
        <span class="cs-status-dot"></span>
        LAUNCHING SOON
      </div>
    </div>

    <div class="cs-center">
      <div class="cs-logo-wrap">
        <svg viewBox="0 0 140 70" role="img" aria-label="Blockvisor" xmlns="http://www.w3.org/2000/svg">
          <title>Blockvisor</title>
          <defs>
            <linearGradient id="csBezel" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#B8A4FF"/>
              <stop offset="50%" stop-color="#5D4FB8"/>
              <stop offset="100%" stop-color="#2A2640"/>
            </linearGradient>
            <linearGradient id="csDisplay" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0F0E14"/>
              <stop offset="50%" stop-color="#2A2640"/>
              <stop offset="100%" stop-color="#0F0E14"/>
            </linearGradient>
            <linearGradient id="csPulse" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#5DCAA5" stop-opacity="0"/>
              <stop offset="50%" stop-color="#9FE1CB" stop-opacity="1"/>
              <stop offset="100%" stop-color="#5DCAA5" stop-opacity="0"/>
            </linearGradient>
            <clipPath id="csDisplayClip">
              <path d="M 12 30 Q 12 16 30 13 L 110 13 Q 128 16 128 30 L 128 42 Q 128 51 118 54 L 86 62 Q 70 65 54 62 L 22 54 Q 12 51 12 42 Z"/>
            </clipPath>
          </defs>

          <path d="M 4 30 Q 4 8 26 4 L 114 4 Q 136 8 136 30 L 136 44 Q 136 56 124 60 L 86 70 Q 70 73 54 70 L 16 60 Q 4 56 4 44 Z" fill="url(#csBezel)"/>
          <path d="M 22 10 Q 35 7 60 6 L 80 6 Q 105 7 118 10 L 114 16 Q 100 12 80 12 L 60 12 Q 40 12 26 16 Z" fill="#F5F3FF" opacity="0.55"/>
          <path d="M 12 30 Q 12 16 30 13 L 110 13 Q 128 16 128 30 L 128 42 Q 128 51 118 54 L 86 62 Q 70 65 54 62 L 22 54 Q 12 51 12 42 Z" fill="url(#csDisplay)"/>

          <line x1="30" y1="18" x2="30" y2="56" stroke="#000" stroke-width="1" opacity="0.7"/>
          <line x1="50" y1="16" x2="50" y2="60" stroke="#000" stroke-width="1" opacity="0.7"/>
          <line x1="70" y1="15" x2="70" y2="62" stroke="#000" stroke-width="1" opacity="0.7"/>
          <line x1="90" y1="16" x2="90" y2="60" stroke="#000" stroke-width="1" opacity="0.7"/>
          <line x1="110" y1="18" x2="110" y2="56" stroke="#000" stroke-width="1" opacity="0.7"/>

          <rect x="14" y="34.5" width="112" height="1" fill="#5DCAA5" opacity="0.4"/>
          <g clip-path="url(#csDisplayClip)">
            <rect x="0" y="33" width="95" height="3" fill="url(#csPulse)" opacity="0.95">
              <animate attributeName="x" from="-95" to="140" dur="2.4s" repeatCount="indefinite"/>
            </rect>
            <rect x="0" y="36.5" width="95" height="1" fill="url(#csPulse)" opacity="0.7">
              <animate attributeName="x" from="-95" to="140" dur="2.4s" repeatCount="indefinite"/>
            </rect>
          </g>

          <rect x="18" y="42" width="3" height="3" fill="#B8A4FF"/>
          <rect x="23" y="42" width="3" height="3" fill="#5DCAA5"/>
          <rect x="18" y="47" width="3" height="3" fill="#B8A4FF" opacity="0.6"/>

          <rect x="118" y="42" width="3" height="3" fill="#B8A4FF"/>
          <rect x="113" y="42" width="3" height="3" fill="#5DCAA5"/>
          <rect x="118" y="47" width="3" height="3" fill="#B8A4FF" opacity="0.6"/>

          <circle cx="8" cy="36" r="2" fill="#0F0E14"/>
          <circle cx="132" cy="36" r="2" fill="#0F0E14"/>
        </svg>
      </div>

      <div class="cs-wordmark">
        <span class="block">block</span><span class="visor">visor</span>
      </div>

      <div class="cs-eyebrow">SOMETHING IS WATCHING THE BLOCKCHAIN</div>
    </div>

    <div class="cs-bottom">
      <div class="cs-copy">© 2026 Blockvisor — See the blockchain clearly</div>
    </div>

  </div>

</body>
</html>
